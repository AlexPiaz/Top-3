<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Giocatori</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 650px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2, h3 {
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    #timer {
      font-size: 28px;
      margin-top: 20px;
      font-weight: bold;
      color: #007bff;
    }

    .box {
      background: #f0f8ff;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<div class="container">
  <h1 style="font-size:40px; color: gold; margin-bottom: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);">TOP 3</h1>
  <h2>Categoria</h2>
  <input type="text" id="categoria" placeholder="Scrivi la categoria">

  <h3>Sezioni aggiuntive</h3>
  <div class="box"><input type="text" placeholder="Sezione 1"></div>
  <div class="box"><input type="text" placeholder="Sezione 2"></div>
  <div class="box"><input type="text" placeholder="Sezione 3"></div>

  <h3>Giocatori (3-10)</h3>
  <div id="giocatori"></div>
  <button onclick="aggiungiGiocatore()">+ Aggiungi Giocatore</button>

  <h3>Timer</h3>
  <input type="number" id="tempoInput" placeholder="Secondi">
  <button onclick="startTimer()">Avvia Timer</button>
  <div id="timer">0</div>
</div>

<script>
  let count = 0;

  function aggiungiGiocatore() {
    if (count >= 10) {
      alert("Massimo 10 giocatori");
      return;
    }
    count++;
    const div = document.createElement("div");
    div.innerHTML = `<input type="text" placeholder="Giocatore ${count}">`;
    document.getElementById("giocatori").appendChild(div);
  }

  let timer;
  function startTimer() {
    let tempo = parseInt(document.getElementById("tempoInput").value);
    if (!tempo || tempo <= 0) {
      alert("Inserisci un tempo valido");
      return;
    }

    clearInterval(timer);
    document.getElementById("timer").textContent = tempo;

    timer = setInterval(() => {
      tempo--;
      document.getElementById("timer").textContent = tempo;

      if (tempo <= 0) {
        clearInterval(timer);
        alert("Tempo scaduto!");
      }
    }, 1000);
  }

  // Aggiungi automaticamente 3 giocatori all'inizio
  for (let i = 0; i < 3; i++) {
    aggiungiGiocatore();
  }
</script>

</body>
</html>
